receivers:
  otlpjsonfile:
    start_at: beginning
    include_file_name: false
    include: metrics1.json

processors:
  batch:
    send_batch_size: 8192
  groupbyattrs:
    keys: [test]

exporters:
  file:
    path: metrics2.json

service:
  pipelines:
    traces:
      receivers: [otlpjsonfile]
      exporters: [file]
    metrics:
      receivers: [otlpjsonfile]
      processors: [batch,groupbyattrs] 
      exporters: [file]
    logs:
      receivers: [otlpjsonfile]
      exporters: [file]
