receivers:
  otlpjsonfile/metrics1:
    start_at: beginning
    include_file_name: false
    include: metrics1.json
  prometheus/telemetry:
    config:
      scrape_configs:
        - job_name: otelcol
          scrape_interval: 1s
          static_configs:
            - targets: ['127.0.0.1:9999']
  
exporters:
  file/metrics2:
    path: metrics2.json
  file/telemetry:
    path: metrics2.telemetry.json

processors:
  batch/telemetry:
  groupbyattrs/telemetry:
    keys:
      - prometheus.type
  batch/pre:
    send_batch_size: 1000000
  batch/post:
    send_batch_size: 1000000
  groupbyattrs/post:
    keys:
      - test1
      - test2
  transform/sg:
    error_mode: propagate
    metric_statements:
      - convert_sum_to_gauge() where metric.type != METRIC_DATA_TYPE_NONE
      - convert_gauge_to_sum("cumulative", true) where metric.type != METRIC_DATA_TYPE_NONE
  cumulativetodelta:
  transform/aggregate:
    error_mode: propagate
    metric_statements:
      - delete_key(resource.attributes, "process.pid") where metric.is_monotonic == true
      - aggregate_on_attributes("sum") where metric.is_monotonic == true
  deltatocumulative:

service:
  pipelines:
    metrics/m2:
      receivers: [otlpjsonfile/metrics1]
      processors: [transform/sg,cumulativetodelta] #,transform/aggregate,deltatocumulative,batch/post,groupbyattrs/post] 
      exporters: [file/metrics2]
    metrics/telemetry:
      receivers: [prometheus/telemetry]
      #processors: [batch/telemetry, groupbyattrs/telemetry]
      exporters: [file/telemetry]
  telemetry:
    metrics:
      level: detailed
      readers:
        - pull:
            exporter:
              prometheus:
                host: 127.0.0.1
                port: 9999   # 👈 change this
    # https://github.com/open-telemetry/opentelemetry-collector/blob/main/service/telemetry/otelconftelemetry/internal/migration/v0.3.0.go#L125
    logs:
      level: debug
      development: false #true
      disable_caller: true
      disable_stacktrace: true
      encoding: json
      disable_zap_resource: true
      sampling:
        enabled: false # log everything, no sampling
      output_paths: metrics2.stdout.json
      error_output_paths: metrics2.stderr.json
