receivers:
  otlp/local:
    protocols:
      grpc:
        endpoint: 127.0.0.1:4317

exporters:
  file/metrics1:
    path: metrics3.json

processors:
  batch:
    send_batch_size: 1000000
  groupbyattrs:
    keys:
      - test1
      - test2
  cumulativetodelta:
  transform/aggregate:
    error_mode: ignore
    metric_statements:
      - delete_key(resource.attributes, "process.pid")
      # - aggregate_on_attributes("sum") where metric.type != METRIC_DATA_TYPE_GAUGE
      # - aggregate_on_attributes("mean") where metric.type == METRIC_DATA_TYPE_GAUGE
      - aggregate_on_attributes("sum") where metric.type != -1
  deltatocumulative:

service:
  pipelines:
    metrics:
      receivers: [otlp/local]
      processors: [cumulativetodelta,transform/aggregate,deltatocumulative,batch,groupbyattrs] 
      exporters: [file/metrics1]
