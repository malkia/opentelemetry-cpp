receivers:
  otlp/local:
    protocols:
      grpc:
        endpoint: 127.0.0.1:4317

exporters:
  file:
    path: C:/p/m/opentelemetry-cpp/otel_sdk/all.json
  # file/metrics:
  #   path: C:/p/m/opentelemetry-cpp/otel_sdk/file_metrics.json
  # file/traces:
  #   path: C:/p/m/opentelemetry-cpp/otel_sdk/file_traces.json
  # file/logs:
  #   path: C:/p/m/opentelemetry-cpp/otel_sdk/file_logs.json

service:
  pipelines:
    traces:
      receivers: [otlp/local]
      exporters: [file]
    metrics:
      receivers: [otlp/local]
      exporters: [file]
    logs:
      receivers: [otlp/local]
      exporters: [file]
